<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReceiptScan — AI Auto-Fill</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a3a;
      --border-bright: #3d3d55;
      --accent: #7c6af7;
      --accent2: #f7c26a;
      --accent3: #6af7c2;
      --text: #e8e8f0;
      --text-muted: #888899;
      --text-dim: #555566;
      --success: #4ade80;
      --error: #f87171;
      --radius: 12px;
      --radius-sm: 8px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      padding: 24px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .logo-text span {
      color: var(--accent);
    }

    .badge {
      font-size: 11px;
      padding: 3px 10px;
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 100px;
      letter-spacing: 0.05em;
    }

    /* Main layout */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      padding: 40px;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    /* Left panel */
    .panel-left {
      padding-right: 40px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Right panel */
    .panel-right {
      padding-left: 40px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .panel-title {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Upload zone */
    .upload-zone {
      border: 1.5px dashed var(--border-bright);
      border-radius: var(--radius);
      padding: 48px 32px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: var(--surface);
      position: relative;
      overflow: hidden;
    }

    .upload-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(124,106,247,0.06) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      background: var(--surface2);
    }

    .upload-zone:hover::before, .upload-zone.drag-over::before {
      opacity: 1;
    }

    .upload-icon {
      font-size: 40px;
      margin-bottom: 16px;
      display: block;
    }

    .upload-title {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }

    .upload-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .btn-upload {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-upload:hover {
      background: #9080f9;
      transform: translateY(-1px);
    }

    #file-input { display: none; }

    /* Preview */
    .preview-container {
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
      position: relative;
    }

    .preview-container img {
      width: 100%;
      max-height: 340px;
      object-fit: contain;
      display: block;
      background: #0d0d14;
    }

    .preview-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .preview-filename {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    .btn-clear {
      padding: 4px 10px;
      border: 1px solid var(--border-bright);
      background: transparent;
      color: var(--text-muted);
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      transition: all 0.15s ease;
    }

    .btn-clear:hover {
      border-color: var(--error);
      color: var(--error);
    }

    /* Analyze button */
    .btn-analyze {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), #9080f9);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      letter-spacing: 0.02em;
      position: relative;
      overflow: hidden;
    }

    .btn-analyze::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    }

    .btn-analyze:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(124,106,247,0.4);
    }

    .btn-analyze:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* API Key input */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-label {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .field-label .required {
      color: var(--accent2);
    }

    .field-input {
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      transition: border-color 0.15s ease;
      outline: none;
      width: 100%;
    }

    .field-input:focus {
      border-color: var(--accent);
    }

    .field-input::placeholder {
      color: var(--text-dim);
    }

    /* Status / loading */
    .status-box {
      padding: 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
    }

    .status-box.loading {
      border-color: var(--accent);
      background: rgba(124,106,247,0.05);
      color: var(--accent);
    }

    .status-box.success {
      border-color: var(--success);
      background: rgba(74,222,128,0.05);
      color: var(--success);
    }

    .status-box.error {
      border-color: var(--error);
      background: rgba(248,113,113,0.05);
      color: var(--error);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(124,106,247,0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    /* Form fields */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .form-card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .form-card-title {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
    }

    .confidence-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 100px;
      background: rgba(74,222,128,0.1);
      color: var(--success);
      border: 1px solid rgba(74,222,128,0.2);
    }

    .form-fields {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .field-input.filled {
      border-color: rgba(124,106,247,0.4);
      background: rgba(124,106,247,0.04);
    }

    /* Skeleton loader */
    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }

    .skeleton {
      height: 40px;
      border-radius: var(--radius-sm);
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite;
    }

    /* Submit section */
    .submit-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent2), #f7a46a);
      color: #0a0a0f;
      border: none;
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-submit:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(247,194,106,0.3);
    }

    .btn-submit:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* Submitted data */
    .submitted-card {
      background: var(--surface);
      border: 1px solid rgba(74,222,128,0.3);
      border-radius: var(--radius);
      padding: 20px;
      display: none;
    }

    .submitted-card.visible { display: block; }

    .submitted-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--success);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .submitted-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .submitted-row:last-child { border-bottom: none; }
    .submitted-key { color: var(--text-muted); }
    .submitted-val { color: var(--accent3); font-weight: 500; }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-dim);
      text-align: center;
      padding: 60px 20px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    .empty-state-icon { font-size: 36px; opacity: 0.4; }
    .empty-state-text { font-size: 13px; }

    /* Responsive */
    @media (max-width: 768px) {
      main {
        grid-template-columns: 1fr;
        padding: 20px;
      }
      .panel-left {
        padding-right: 0;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding-bottom: 32px;
      }
      .panel-right { padding-left: 0; }
      .form-row { grid-template-columns: 1fr; }
      header { padding: 16px 20px; }
    }

    /* Pulse dot */
    .pulse-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--success);
      position: relative;
    }
    .pulse-dot::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 1px solid var(--success);
      animation: pulse-ring 1.5s ease infinite;
    }
    @keyframes pulse-ring {
      0% { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(1.6); opacity: 0; }
    }

    .model-tag {
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">🧾</div>
      <div class="logo-text">Receipt<span>Scan</span></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="model-tag">
        <div class="pulse-dot"></div>
        claude-sonnet-4-20250514
      </div>
      <div class="badge">AI AUTO-FILL</div>
    </div>
  </header>

  <main>
    <!-- LEFT: Upload -->
    <div class="panel-left">
      <div class="panel-title">01 — Upload Receipt</div>

      <div class="field-group">
        <label class="field-label">
          Anthropic API Key <span class="required">*</span>
        </label>
        <input
          type="password"
          id="api-key"
          class="field-input"
          placeholder="sk-ant-api03-..."
        />
      </div>

      <div id="upload-zone" class="upload-zone">
        <span class="upload-icon">📷</span>
        <div class="upload-title">Drop your receipt here</div>
        <div class="upload-sub">JPEG, PNG, WEBP, or PDF — max 5MB</div>
        <button class="btn-upload" onclick="document.getElementById('file-input').click()">
          ↑ Choose File
        </button>
        <input type="file" id="file-input" accept="image/*,.pdf" />
      </div>

      <div id="preview-container" class="preview-container" style="display:none;">
        <img id="preview-img" src="" alt="Receipt preview" />
        <div class="preview-overlay">
          <span class="preview-filename" id="preview-filename"></span>
          <button class="btn-clear" onclick="clearFile()">✕ Remove</button>
        </div>
      </div>

      <div id="status-box" style="display:none;"></div>

      <button id="btn-analyze" class="btn-analyze" onclick="analyzeReceipt()" disabled>
        ✦ Extract with AI
      </button>
    </div>

    <!-- RIGHT: Form -->
    <div class="panel-right">
      <div class="panel-title">02 — Review & Submit</div>

      <div id="empty-state" class="empty-state">
        <div class="empty-state-icon">◈</div>
        <div class="empty-state-text">Upload a receipt and run<br/>AI extraction to auto-fill the form.</div>
      </div>

      <div id="form-card" class="form-card" style="display:none;">
        <div class="form-card-header">
          <span class="form-card-title">Extracted Fields</span>
          <span class="confidence-badge" id="confidence-badge">✓ Auto-filled</span>
        </div>
        <div class="form-fields">
          <div class="field-group">
            <label class="field-label">Merchant Name</label>
            <input type="text" id="f-merchant" class="field-input" placeholder="e.g. Starbucks" />
          </div>
          <div class="form-row">
            <div class="field-group">
              <label class="field-label">Date</label>
              <input type="text" id="f-date" class="field-input" placeholder="DD/MM/YYYY" />
            </div>
            <div class="field-group">
              <label class="field-label">Currency</label>
              <input type="text" id="f-currency" class="field-input" placeholder="e.g. MYR" />
            </div>
          </div>
          <div class="field-group">
            <label class="field-label">Total Amount</label>
            <input type="text" id="f-total" class="field-input" placeholder="0.00" />
          </div>
          <div class="field-group">
            <label class="field-label">Notes (optional)</label>
            <input type="text" id="f-notes" class="field-input" placeholder="Any additional notes..." />
          </div>
        </div>
      </div>

      <div id="submit-section" class="submit-section" style="display:none;">
        <button class="btn-submit" id="btn-submit" onclick="submitForm()">
          ✓ Submit Entry
        </button>
      </div>

      <div id="submitted-card" class="submitted-card">
        <div class="submitted-title">✓ Submission Saved</div>
        <div id="submitted-content"></div>
      </div>
    </div>
  </main>
</div>

<script>
  let currentFile = null;
  let currentBase64 = null;
  let extractedData = null;

  // --- Drag & drop ---
  const uploadZone = document.getElementById('upload-zone');

  uploadZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadZone.classList.add('drag-over');
  });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });
  uploadZone.addEventListener('click', () => document.getElementById('file-input').click());

  document.getElementById('file-input').addEventListener('change', (e) => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
  });

  function handleFile(file) {
    if (file.size > 5 * 1024 * 1024) {
      showStatus('error', '✕ File too large. Max 5MB.');
      return;
    }
    currentFile = file;

    const reader = new FileReader();
    reader.onload = (e) => {
      const dataUrl = e.target.result;
      currentBase64 = dataUrl.split(',')[1];

      // Show preview
      const preview = document.getElementById('preview-container');
      const img = document.getElementById('preview-img');
      const fname = document.getElementById('preview-filename');

      if (file.type.startsWith('image/')) {
        img.src = dataUrl;
        preview.style.display = 'block';
      } else {
        img.src = '';
        img.alt = 'PDF selected';
        preview.style.display = 'none';
      }

      fname.textContent = file.name;
      uploadZone.style.display = 'none';
      preview.style.display = 'block';

      document.getElementById('btn-analyze').disabled = false;
      clearStatus();
    };
    reader.readAsDataURL(file);
  }

  function clearFile() {
    currentFile = null;
    currentBase64 = null;
    document.getElementById('preview-container').style.display = 'none';
    document.getElementById('upload-zone').style.display = 'block';
    document.getElementById('file-input').value = '';
    document.getElementById('btn-analyze').disabled = true;
    clearStatus();
  }

  function showStatus(type, message) {
    const box = document.getElementById('status-box');
    box.style.display = 'flex';
    box.className = 'status-box ' + type;
    if (type === 'loading') {
      box.innerHTML = `<div class="spinner"></div><span>${message}</span>`;
    } else if (type === 'success') {
      box.innerHTML = `<span>✓</span><span>${message}</span>`;
    } else {
      box.innerHTML = `<span>✕</span><span>${message}</span>`;
    }
  }

  function clearStatus() {
    const box = document.getElementById('status-box');
    box.style.display = 'none';
    box.className = 'status-box';
  }

  // --- AI Extraction ---
  async function analyzeReceipt() {
    const apiKey = document.getElementById('api-key').value.trim();
    if (!apiKey) {
      showStatus('error', 'Please enter your Anthropic API key.');
      return;
    }
    if (!currentBase64) {
      showStatus('error', 'Please upload a receipt first.');
      return;
    }

    document.getElementById('btn-analyze').disabled = true;
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('form-card').style.display = 'none';
    document.getElementById('submit-section').style.display = 'none';
    document.getElementById('submitted-card').classList.remove('visible');

    showStatus('loading', 'Analysing receipt with Claude…');

    const mediaType = currentFile.type || 'image/jpeg';

    const prompt = `You are a receipt data extraction assistant. Analyse this receipt image and extract exactly the following fields. Return ONLY a valid JSON object with no markdown, no explanation, no code fences. Just raw JSON.

Fields to extract:
- merchant_name: The name of the store, restaurant, or business
- date: The transaction date in format DD/MM/YYYY (infer or convert as needed)
- total_amount: The final total amount as a numeric string with 2 decimal places (e.g. "24.90")
- currency: The 3-letter ISO currency code (e.g. MYR, USD, SGD, GBP). Infer from context, country, or symbols if not explicit.

If a field cannot be found, use an empty string "".

Example output:
{"merchant_name":"Starbucks KLCC","date":"12/05/2026","total_amount":"18.50","currency":"MYR"}`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 500,
          messages: [
            {
              role: 'user',
              content: [
                {
                  type: 'image',
                  source: {
                    type: 'base64',
                    media_type: mediaType,
                    data: currentBase64
                  }
                },
                {
                  type: 'text',
                  text: prompt
                }
              ]
            }
          ]
        })
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        const msg = err?.error?.message || `HTTP ${response.status}`;
        throw new Error(msg);
      }

      const data = await response.json();
      const rawText = data.content?.map(b => b.type === 'text' ? b.text : '').join('').trim();

      // Strip any accidental markdown fences
      const cleaned = rawText.replace(/```json|```/g, '').trim();
      extractedData = JSON.parse(cleaned);

      // Populate form
      document.getElementById('f-merchant').value = extractedData.merchant_name || '';
      document.getElementById('f-date').value = extractedData.date || '';
      document.getElementById('f-currency').value = extractedData.currency || '';
      document.getElementById('f-total').value = extractedData.total_amount || '';

      // Mark filled fields
      ['f-merchant', 'f-date', 'f-currency', 'f-total'].forEach(id => {
        const el = document.getElementById(id);
        if (el.value) el.classList.add('filled');
        el.addEventListener('input', () => {
          el.classList.toggle('filled', el.value.length > 0);
        });
      });

      document.getElementById('form-card').style.display = 'block';
      document.getElementById('submit-section').style.display = 'flex';
      showStatus('success', 'Extraction complete — review and edit the fields below.');

    } catch (err) {
      console.error(err);
      showStatus('error', 'Extraction failed: ' + err.message);
      document.getElementById('empty-state').style.display = 'flex';
    } finally {
      document.getElementById('btn-analyze').disabled = false;
    }
  }

  // --- Submit ---
  function submitForm() {
    const entry = {
      merchant_name: document.getElementById('f-merchant').value || '—',
      date: document.getElementById('f-date').value || '—',
      total_amount: document.getElementById('f-total').value || '—',
      currency: document.getElementById('f-currency').value || '—',
      notes: document.getElementById('f-notes').value || '—',
      submitted_at: new Date().toLocaleString('en-MY', { timeZone: 'Asia/Kuala_Lumpur' })
    };

    // In-memory store
    if (!window.submissions) window.submissions = [];
    window.submissions.push(entry);

    // Show confirmation
    const card = document.getElementById('submitted-card');
    const content = document.getElementById('submitted-content');
    content.innerHTML = Object.entries({
      'Merchant': entry.merchant_name,
      'Date': entry.date,
      'Amount': `${entry.currency} ${entry.total_amount}`,
      'Notes': entry.notes,
      'Submitted': entry.submitted_at
    }).map(([k, v]) =>
      `<div class="submitted-row"><span class="submitted-key">${k}</span><span class="submitted-val">${v}</span></div>`
    ).join('');

    card.classList.add('visible');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    document.getElementById('btn-submit').textContent = '✓ Saved — Submit Another';
    document.getElementById('btn-submit').onclick = resetForAnother;
  }

  function resetForAnother() {
    clearFile();
    document.getElementById('form-card').style.display = 'none';
    document.getElementById('submit-section').style.display = 'none';
    document.getElementById('submitted-card').classList.remove('visible');
    document.getElementById('empty-state').style.display = 'flex';
    document.getElementById('btn-submit').textContent = '✓ Submit Entry';
    document.getElementById('btn-submit').onclick = submitForm;
    ['f-merchant','f-date','f-currency','f-total','f-notes'].forEach(id => {
      const el = document.getElementById(id);
      el.value = '';
      el.classList.remove('filled');
    });
    clearStatus();
  }
</script>
</body>
</html>
